name: Build

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  build:
    name: Build macOS app
    runs-on: macos-15

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Select Xcode
        run: sudo xcode-select -s $(ls -d /Applications/Xcode_*.app | sort -V | tail -1)

      - name: Show Xcode version
        run: xcodebuild -version

      - name: Install XcodeGen
        run: brew install xcodegen

      - name: Generate Xcode project
        run: xcodegen generate

      - name: Build
        run: |
          xcodebuild build \
            -project Punctual.xcodeproj \
            -scheme Punctual \
            -configuration Debug \
            -destination 'platform=macOS,arch=arm64' \
            -derivedDataPath .build \
            CODE_SIGN_IDENTITY="-" \
            CODE_SIGNING_REQUIRED=NO \
            CODE_SIGNING_ALLOWED=NO

      - name: Zip app bundle
        run: |
          cd .build/Build/Products/Debug
          zip -r Punctual.zip Punctual.app

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: Punctual-${{ github.sha }}
          path: .build/Build/Products/Debug/Punctual.zip
          retention-days: 30
