name: Build

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  build:
    name: Build macOS app
    runs-on: macos-15

    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Select Xcode
        run: sudo xcode-select -s $(ls -d /Applications/Xcode_*.app | sort -V | tail -1)

      - name: Show Xcode version
        run: xcodebuild -version

      - name: Install XcodeGen
        run: brew install xcodegen

      - name: Generate Xcode project
        run: xcodegen generate

      - name: Build
        run: |
          xcodebuild build \
            -project Punctual.xcodeproj \
            -scheme Punctual \
            -configuration Debug \
            -destination 'platform=macOS,arch=arm64' \
            -derivedDataPath .build \
            CODE_SIGN_IDENTITY="-" \
            CODE_SIGNING_REQUIRED=NO \
            CODE_SIGNING_ALLOWED=NO

      - name: Test
        run: |
          xcodebuild test \
            -project Punctual.xcodeproj \
            -scheme Punctual \
            -destination 'platform=macOS,arch=arm64' \
            -derivedDataPath .build \
            -enableCodeCoverage YES \
            -resultBundlePath .build/TestResults.xcresult \
            CODE_SIGN_IDENTITY="-" \
            CODE_SIGNING_REQUIRED=NO \
            CODE_SIGNING_ALLOWED=NO

      - name: Generate coverage report
        run: |
          xcrun xccov view --report --json .build/TestResults.xcresult > .build/coverage.json
          xcrun xccov view --report .build/TestResults.xcresult | tee .build/coverage.txt
          echo "### Coverage summary" >> $GITHUB_STEP_SUMMARY
          echo '```' >> $GITHUB_STEP_SUMMARY
          xcrun xccov view --report .build/TestResults.xcresult >> $GITHUB_STEP_SUMMARY
          echo '```' >> $GITHUB_STEP_SUMMARY

      - name: Upload coverage report
        uses: actions/upload-artifact@v7
        with:
          name: coverage-${{ github.sha }}
          path: |
            .build/coverage.json
            .build/coverage.txt
          retention-days: 30

      - name: Zip app bundle
        run: |
          cd .build/Build/Products/Debug
          zip -r Punctual.zip Punctual.app

      - name: Upload artifact
        uses: actions/upload-artifact@v7
        with:
          name: Punctual-${{ github.sha }}
          path: .build/Build/Products/Debug/Punctual.zip
          retention-days: 30
