name: Release

on:
  push:
    branches: [main]

permissions:
  contents: write

jobs:
  release:
    name: Build and publish release
    runs-on: macos-15

    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Select Xcode
        run: sudo xcode-select -s $(ls -d /Applications/Xcode_*.app | sort -V | tail -1)

      - name: Show Xcode version
        run: xcodebuild -version

      - name: Install XcodeGen
        run: brew install xcodegen

      - name: Generate Xcode project
        run: xcodegen generate

      - name: Build
        run: |
          xcodebuild build \
            -project Punctual.xcodeproj \
            -scheme Punctual \
            -configuration Release \
            -destination 'platform=macOS,arch=arm64' \
            -derivedDataPath .build \
            CODE_SIGN_IDENTITY="-" \
            CODE_SIGNING_REQUIRED=NO \
            CODE_SIGNING_ALLOWED=NO

      - name: Zip app bundle
        run: |
          cd .build/Build/Products/Release
          zip -r Punctual.zip Punctual.app

      - name: Create GitHub release
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          TAG="v$(date -u +%Y.%m.%d)-${GITHUB_SHA::7}"
          NOTES="$(git log -1 --pretty=%B)"
          gh release create "$TAG" \
            --title "Punctual $TAG" \
            --notes "$NOTES" \
            .build/Build/Products/Release/Punctual.zip#Punctual.zip
