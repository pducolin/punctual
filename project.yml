name: Punctual
options:
  bundleIdPrefix: com.pducolin
  deploymentTarget:
    macOS: "14.0"
  createIntermediateGroups: true

targets:
  Punctual:
    type: application
    platform: macOS
    sources:
      - path: Punctual/Sources
    info:
      path: Punctual/Resources/Info.plist
      properties:
        CFBundleDisplayName: Punctual
        LSUIElement: true
        NSCalendarsFullAccessUsageDescription: "Punctual reads your calendar to remind you about upcoming meetings."
    entitlements:
      path: Punctual/Resources/Punctual.entitlements
    dependencies:
      - sdk: ServiceManagement.framework
      - target: PunctualWidget
        embed: true
        link: false
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: com.pducolin.Punctual
        SWIFT_VERSION: "5.9"
        MACOSX_DEPLOYMENT_TARGET: "14.0"
        CODE_SIGN_IDENTITY: "-"
        INFOPLIST_FILE: Punctual/Resources/Info.plist
        ENABLE_HARDENED_RUNTIME: YES
        ENABLE_TESTABILITY: YES

  PunctualWidget:
    type: app-extension
    platform: macOS
    sources:
      - path: PunctualWidget/Sources
    info:
      path: PunctualWidget/Resources/Info.plist
      properties:
        CFBundleDisplayName: PunctualWidget
        NSExtension:
          NSExtensionPointIdentifier: com.apple.widgetkit-extension
        NSCalendarsFullAccessUsageDescription: "Punctual reads your calendar to show upcoming meetings."
    dependencies:
      - sdk: WidgetKit.framework
      - sdk: SwiftUI.framework
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: com.pducolin.Punctual.PunctualWidget
        SWIFT_VERSION: "5.9"
        MACOSX_DEPLOYMENT_TARGET: "14.0"
        CODE_SIGN_IDENTITY: "-"
        ENABLE_HARDENED_RUNTIME: YES

  PunctualTests:
    type: bundle.unit-test
    platform: macOS
    sources:
      - path: PunctualTests/Sources
    dependencies:
      - target: Punctual
        embed: false
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: com.pducolin.PunctualTests
        SWIFT_VERSION: "5.9"
        MACOSX_DEPLOYMENT_TARGET: "14.0"
        CODE_SIGN_IDENTITY: "-"
        TEST_HOST: "$(BUILT_PRODUCTS_DIR)/Punctual.app/Contents/MacOS/Punctual"
        BUNDLE_LOADER: "$(TEST_HOST)"

schemes:
  Punctual:
    build:
      targets:
        Punctual: all
        PunctualTests: [testing]
    test:
      targets:
        - PunctualTests
    run:
      config: Debug
    archive:
      config: Release
